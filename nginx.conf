server {
    listen 80;
    server_name cemilankasir.local; # Ganti dengan domain Anda

    # ROOT UTAMA: Diarahkan ke folder build React (dist)
    root /var/www/cemilankasir/dist; 
    index index.html;

    # ==============================================================================
    # FRONTEND CONFIGURATION (React Router SPA Support)
    # ==============================================================================
    location / {
        # Mencari file asli, jika tidak ada arahkan ke index.html (Sama seperti RewriteRule ^ index.html [L])
        try_files $uri $uri/ /index.html;
    }

    # ==============================================================================
    # BACKEND CONFIGURATION (php_server Subfolder)
    # ==============================================================================
    location /php_server {
        root /var/www/cemilankasir; # Memastikan nginx mencari ke folder /var/www/cemilankasir/php_server
        index index.php;

        # 1. Keamanan: Blokir akses langsung ke .env, .git, file .log, dan .json
        # Mengalihkan ke root utama (redirect 301) seperti aturan Apache Anda
        location ~* /php_server/(^\.|.*\.log$|.*\.json$) {
            return 301 /;
        }

        # 2. Front Controller Pattern: Arahkan request ke index.php jika file fisik tidak ada
        try_files $uri $uri/ /php_server/index.php?$query_string;
    }

    # 3. Memproses eksekusi script PHP melalui FastCGI (PHP-FPM)
    location ~ \.php$ {
        root /var/www/cemilankasir;
        include snippets/fastcgi-php.conf;
        
        # Sesuaikan dengan versi PHP-FPM yang berjalan di server Anda
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock; 
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Otomatis meneruskan Authorization Header (JWT) ke PHP tanpa konfigurasi tambahan
        fastcgi_pass_header Authorization;
    }

    # ==============================================================================
    # GLOBAL SECURITY & OPTIMIZATION
    # ==============================================================================

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Mencegah Directory Listing (Options -Indexes)
    autoindex off;

    # Gzip Compression (Menggantikan mod_deflate)
    gzip on;
    gzip_types text/html text/plain text/xml text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;

    # Cache Control untuk Static Assets (Menggantikan mod_expires)
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}